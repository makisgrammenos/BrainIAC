model:
  max_epochs: 200

data:
  size: [96,96,96]
  batch_size: 16
  num_workers: 8
  csv_file: "/var/local/storage/dha202305/ADNI_preprocessed/train.csv"
  val_csv: "/var/local/storage/dha202305/ADNI_preprocessed/test.csv"
  root_dir:  "/var/local/storage/dha202305/ADNI_preprocessed/final"

simclrvit:
  ckpt_path: "checkpoints/BrainIAC.ckpt"

optim:
  lr: 0.0008
  momentum: 0.9
  weight_decay: 0.0001
  clr: "no"

logger:
  save_dir: "./checkpoints"
  save_name: "best-model-{epoch:02d}-{val_auc:.2f}"
  run_name: "finetune"
  project_name: "linear_prob"
gpu:
  visible_device: "0" 
train: 
  freeze: "yes"
  finetune: "no"
  

trainer:
  strategy: "auto"
  precision: "16-mixed"